<address-search
	class="absolute top-6 right-6"
	[originCoords]="currentPositionLatLng()"
	(searchedCoords)="zoomTo($event)" />
<layers-settings
	class="absolute bottom-6 left-6"
	[swisstopoWMTSCapabilities]="swisstopoWMTSCapabilities()"
	(layersSettings)="updateLayers($event)" />
<time-of-day-settings
	class="absolute right-6 bottom-6"
	[referenceDate]="referenceDate"
	(timeOfDaySettings)="updateTimeOfDay($event)" />
<canvas #canvas class="absolute -z-10"></canvas>
