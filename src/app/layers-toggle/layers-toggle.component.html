<div class="relative">
	<button
		id="dropdownInformationButton"
		data-dropdown-toggle="dropdownInformation"
		data-dropdown-placement="top"
		data-dropdown-offset-skidding="150"
		class="inline-flex items-center rounded-lg bg-gray-800 px-5 py-2.5 text-center text-sm font-medium text-white ring-1 ring-white hover:bg-gray-800 focus:outline-none"
		type="button">
		Layers
	</button>

	<div id="dropdownInformation" class="z-10 hidden w-96 divide-y divide-white rounded-lg bg-gray-800 shadow">
		<div class="space-y-4 px-4 py-3 text-sm text-white">
			<h3>3D tiles</h3>

			<div>
				<label class="inline-flex cursor-pointer items-center">
					<input
						type="checkbox"
						[checked]="googleTilesEnabled()"
						(change)="onGoogleTilesToggle($event)"
						value=""
						class="peer sr-only" />
					<div
						class="peer relative h-6 w-11 rounded-full bg-gray-200 peer-checked:bg-teal-600 peer-focus:ring-4 peer-focus:ring-teal-300 after:absolute after:start-[2px] after:top-0.5 after:h-5 after:w-5 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:after:translate-x-full peer-checked:after:border-white rtl:peer-checked:after:-translate-x-full"></div>
					<span class="ms-3 text-sm font-medium text-white">Google photorealistic tiles</span>
				</label>
				<!--<div class="ml-14">
					<label for="google-tiles-opacity-range" class="mb-2 block text-sm text-white">Opacity</label>
					<input
						id="google-tiles-opacity-range"
						type="range"
						[value]="googleTilesOpacity()"
						(change)="onGoogleTilesOpacityChange($event)"
						min="0"
						max="1"
						step="0.01"
						class="h-2 w-full cursor-pointer appearance-none rounded-lg bg-gray-200" />
				</div>-->
			</div>
			<div>
				<label class="inline-flex cursor-pointer items-center">
					<input
						type="checkbox"
						[checked]="swisstopoBuildingsTilesEnabled()"
						(change)="onBuildingsTilesToggle($event)"
						value=""
						class="peer sr-only" />
					<div
						class="peer relative h-6 w-11 rounded-full bg-gray-200 peer-checked:bg-teal-600 peer-focus:ring-4 peer-focus:ring-teal-300 after:absolute after:start-[2px] after:top-0.5 after:h-5 after:w-5 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:after:translate-x-full peer-checked:after:border-white rtl:peer-checked:after:-translate-x-full"></div>
					<span class="ms-3 text-sm font-medium text-white">swisstopo swissBUILDINGS3D tiles</span>
				</label>
			</div>
			<div>
				<label class="inline-flex cursor-pointer items-center">
					<input
						type="checkbox"
						[checked]="swisstopoVegetationTilesEnabled()"
						(change)="onVegetationTilesToggle($event)"
						value=""
						class="peer sr-only" />
					<div
						class="peer relative h-6 w-11 rounded-full bg-gray-200 peer-checked:bg-teal-600 peer-focus:ring-4 peer-focus:ring-teal-300 after:absolute after:start-[2px] after:top-0.5 after:h-5 after:w-5 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:after:translate-x-full peer-checked:after:border-white rtl:peer-checked:after:-translate-x-full"></div>
					<span class="ms-3 text-sm font-medium text-white">swisstopo vegetation 3D tiles</span>
				</label>
			</div>
			<div>
				<label class="inline-flex cursor-pointer items-center">
					<input
						type="checkbox"
						[checked]="adminOverlayEnabled()"
						(change)="onAdminOverlayToggle($event)"
						value=""
						class="peer sr-only" />
					<div
						class="peer relative h-6 w-11 rounded-full bg-gray-200 peer-checked:bg-teal-600 peer-focus:ring-4 peer-focus:ring-teal-300 after:absolute after:start-[2px] after:top-0.5 after:h-5 after:w-5 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:after:translate-x-full peer-checked:after:border-white rtl:peer-checked:after:-translate-x-full"></div>
					<span class="ms-3 text-sm font-medium text-white">Administrative overlay</span>
				</label>
			</div>

			<!-- swisstopo overlay layer and time dimension selection -->
			@if (swisstopoWMTSCapabilities()) {
				<div>
					<h3 class="mt-6 mb-3">swisstopo base layer</h3>

					<div>
						<label for="swisstopo-overlay-layer-select" class="mb-2 block text-sm font-medium text-white"
							>Layer</label
						>
						<select
							id="swisstopo-overlay-layer-select"
							[value]="selectedBaseLayer()"
							(change)="onBaseLayerChange($event)"
							class="block w-full rounded-lg border border-gray-300 bg-gray-700 px-3 py-2 text-sm text-white placeholder-gray-400 focus:border-teal-500 focus:ring-teal-500">
							@for (layer of availableBaseLayers(); track layer.identifier) {
								<option
									class="text-sm"
									[value]="layer.identifier"
									[selected]="layer.identifier === selectedBaseLayer()">
									{{ layer.title }}
								</option>
							}
						</select>
					</div>

					<div class="mt-3">
						<label
							for="swisstopo-overlay-layer--time-select"
							class="mb-2 block text-sm font-medium text-white"
							>Year</label
						>
						<select
							id="swisstopo-overlay-layer--time-select"
							[value]="selectedBaseTimeDimension()"
							(change)="onBaseTimeDimensionChange($event)"
							class="block w-full rounded-lg border border-gray-300 bg-gray-700 px-3 py-2 text-sm text-white placeholder-gray-400 focus:border-teal-500 focus:ring-teal-500">
							@for (year of availableTimeDimensionsForBaseLayer(); track year) {
								<option
									class=""
									text-sm
									[value]="year"
									[selected]="year === selectedBaseTimeDimension()">
									{{ year === 'current' ? 'Latest' : year }}
								</option>
							}
						</select>
					</div>

					<h3 class="mt-6 mb-3">swisstopo overlays</h3>

					<div>
						<label
							for="swisstopo-additional-overlay-select"
							class="mb-2 block text-sm font-medium text-white"
							>Layer</label
						>
						<select
							id="swisstopo-additional-overlay-select"
							[value]="selectedAdditionalLayer() ?? ''"
							(change)="onAdditionalOverlayChange($event)"
							class="block w-full rounded-lg border border-gray-300 bg-gray-700 px-3 py-2 text-sm text-white placeholder-gray-400 focus:border-teal-500 focus:ring-teal-500">
							<option value="" [selected]="!selectedAdditionalLayer()">None</option>
							@for (layer of availableAdditionalLayers(); track layer.identifier) {
								<option
									class="text-sm"
									[value]="layer.identifier"
									[selected]="layer.identifier === selectedAdditionalLayer()">
									{{ layer.title }}
								</option>
							}
						</select>
					</div>

					@if (selectedAdditionalLayer() && availableTimeDimensionsForAdditionalLayer().length > 1) {
						<div class="mt-3">
							<label
								for="swisstopo-additional-overlay-time-select"
								class="mb-2 block text-sm font-medium text-white"
								>Year</label
							>
							<select
								id="swisstopo-additional-overlay-time-select"
								[value]="selectedAdditionalLayerTimeDimension()"
								(change)="onAdditionalOverlayTimeDimensionChange($event)"
								class="block w-full rounded-lg border border-gray-300 bg-gray-700 px-3 py-2 text-sm text-white placeholder-gray-400 focus:border-teal-500 focus:ring-teal-500">
								@for (year of availableTimeDimensionsForAdditionalLayer(); track year) {
									<option [value]="year" [selected]="year === selectedAdditionalLayerTimeDimension()">
										{{ year === 'current' ? 'Latest' : year }}
									</option>
								}
							</select>
						</div>
					}

					@if (selectedAdditionalLayer()) {
						<div class="mt-3">
							<label
								for="swisstopo-additional-overlay-opacity"
								class="mb-2 block text-sm font-medium text-white"
								>Opacity: {{ (selectedAdditionalLayerOpacity() * 100).toFixed(0) }}%</label
							>
							<input
								id="swisstopo-additional-overlay-opacity"
								type="range"
								min="0"
								max="1"
								step="0.01"
								[value]="selectedAdditionalLayerOpacity()"
								(change)="onAdditionalOverlayOpacityChange($event)"
								class="h-2 w-full cursor-pointer appearance-none rounded-lg bg-gray-600" />
						</div>
					}
				</div>
			}
		</div>
	</div>
</div>
