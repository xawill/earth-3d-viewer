<div class="flex items-center gap-3 rounded-lg bg-gray-800 px-4 py-2.5 ring-1 ring-white">
	<label for="time-range" class="text-sm font-medium whitespace-nowrap text-white tabular-nums"
		>Time: {{ timeDisplay() }}</label
	>
	<input
		id="time-range"
		type="range"
		[value]="totalMinutes()"
		(input)="onTimeSliderChange($event)"
		min="0"
		max="1439"
		step="1"
		class="h-2 min-w-32 flex-1 cursor-pointer appearance-none rounded-lg bg-gray-200" />
</div>
